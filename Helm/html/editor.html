<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }
  #editor {
    height: 100%;
    overflow: auto;
  }
  #editor .cm-editor {
    height: 100%;
  }
  #editor .cm-scroller {
    overflow: auto;
  }
  .cm-wrap .cm-editor .cm-content {
    white-space: pre-wrap;
    word-break: break-all;
  }
  #editor {
    position: relative;
  }
  .cm-notice {
    font-family: -apple-system, BlinkMacSystemFont, Helvetica, sans-serif;
    font-size: 13px;
    color: #999;
    text-align: center;
    position: absolute;
    top: 40%;
    left: 0;
    right: 0;
    z-index: 10;
    user-select: none;
    cursor: default;
    pointer-events: none;
  }
  @media (prefers-color-scheme: dark) {
    .cm-notice { color: #666; }
  }
</style>
</head>
<body>
<div id="editor"></div>
<script src="codemirror-bundle.js"></script>
</body>
</html>
